name: Keep Apps Awake

# This controls when the script runs
on:
  schedule:
    # Runs at 00:00 UTC every single day
    - cron: '0 0 * * *'
  # Allows you to trigger it manually from the GitHub website if you want
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Hugging Face Space
        # Sends a silent web request to the direct container URL
        run: curl -s -o /dev/null -w "%{http_code}" https://rishabhptdr-movie-success-predictor.hf.space
        
      - name: Ping Streamlit Cloud
        # REPLACE THIS URL with your actual Streamlit app link
        run: curl -s -o /dev/null -w "%{http_code}" https://your-app-name.streamlit.app